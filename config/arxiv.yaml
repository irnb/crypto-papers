---
queries:
  - label: DeFi
    query: 'all:DeFi OR all:"decentralized finance"'
  - label: AMM / DEX
    query: 'all:"automated market maker" OR all:AMM OR all:DEX'
  - label: Prediction markets
    query: '(all:"prediction market" OR all:"prediction markets" OR all:Polymarket OR all:futarchy OR all:"information market") AND (all:blockchain OR all:crypto OR all:DeFi OR all:Ethereum)'
  - label: MEV
    query: 'all:MEV AND all:blockchain'
  - label: ZK blockchain
    query: '(all:"zero knowledge" OR all:"zero-knowledge" OR all:zkSNARK OR all:zkVM) AND all:blockchain'
  - label: zkVM
    query: 'all:zkVM OR all:"zero-knowledge virtual machine"'
  - label: Ethereum execution
    query: 'all:EVM AND (all:execution OR all:gas OR all:parallelism OR all:state)'
  - label: Rollups
    query: 'all:rollup AND (all:Ethereum OR all:blockchain OR all:L2)'
  - label: L2 architecture
    query: '(all:"layer 2" OR all:L2 OR all:rollup) AND (all:architecture OR all:interoperability OR all:sequencer OR all:"data availability")'
  - label: Core protocol design
    query: 'all:blockchain AND (all:"protocol design" OR all:"protocol architecture" OR all:consensus OR all:"peer-to-peer" OR all:p2p)'
  - label: Node internals
    query: '(all:blockchain OR all:Bitcoin OR all:Ethereum) AND (all:node OR all:client OR all:mempool OR all:storage OR all:"state sync" OR all:"peer-to-peer")'
  - label: Protocol architecture
    query: '(all:blockchain OR all:Bitcoin OR all:Ethereum) AND (all:"software architecture" OR all:"system architecture" OR all:"protocol architecture" OR all:"implementation tradeoff" OR all:"trade-off")'
  - label: Consensus and networking
    query: 'all:blockchain AND (all:consensus OR all:networking OR all:"peer-to-peer" OR all:p2p OR all:gossip)'
  - label: Bitcoin covenants
    query: 'all:Bitcoin AND (all:covenant OR all:covenants OR all:vault)'
  - label: Bitcoin node policy
    query: 'all:Bitcoin AND (all:mempool OR all:relay OR all:policy OR all:"Bitcoin Core" OR all:"transaction relay")'
  - label: BitVM
    query: 'all:BitVM OR all:"Bitcoin virtual machine"'
  - label: Bitcoin PQC
    query: 'all:Bitcoin AND (all:"post-quantum" OR all:PQC OR all:quantum)'
  - label: Verifiable computation
    query: 'all:"verifiable computation" OR all:"verifiable inference"'
  - label: AI agents crypto
    query: '(all:"AI agent" OR all:"autonomous agent") AND (all:blockchain OR all:crypto OR all:Ethereum)'
  - label: Intents and account abstraction
    query: '(all:intent OR all:intents OR all:"account abstraction" OR all:"ERC-4337" OR all:"smart account") AND (all:Ethereum OR all:blockchain OR all:crypto)'
  - label: Stablecoins and payments
    query: '(all:stablecoin OR all:stablecoins OR all:payment OR all:payments OR all:x402 OR all:"payment channel") AND (all:blockchain OR all:crypto OR all:Ethereum)'
  - label: RWA tokenization
    query: '(all:"real-world asset" OR all:RWA OR all:tokenization OR all:tokenized) AND (all:blockchain OR all:crypto OR all:Ethereum)'
  - label: Emerging applications
    query: '(all:"application layer" OR all:"consumer crypto" OR all:"on-chain" OR all:"decentralized application" OR all:dApp) AND (all:blockchain OR all:crypto OR all:Ethereum)'
  - label: Wallet identity reputation
    query: '(all:wallet OR all:identity OR all:reputation OR all:"social graph") AND (all:blockchain OR all:crypto OR all:Ethereum)'
  - label: DePIN
    query: '(all:DePIN OR all:"decentralized physical infrastructure" OR all:"decentralized storage" OR all:"decentralized compute") AND (all:blockchain OR all:crypto)'

max_results_per_query: 100
sleep_seconds: 2
output_path: data/inbox/arxiv/latest.json

